format = """
[в–‘в–’в–“](#1D2230)\
[пҢғ ](bg:#1D2230 fg:#7B0DEA)\
$directory\
$git_branch\
$git_status\
$time\
[оӮҙ ](fg:#1D2230)\
\n$character"""

[character]
disabled = true
success_symbol = '[пҗІ](yellow)'
error_symbol = '[пҗІ](bold red)'
vimcmd_symbol = '[пҗҙ](bold green)'
vimcmd_replace_one_symbol = '[пҗҙ](bold purple)'
vimcmd_replace_symbol = '[пҗҙ](bold fg:color_purple)'
vimcmd_visual_symbol = '[пҗҙ](bold green)'

[directory]
style = "fg:#00FF87 bg:#1D2230"
format = "[ $path ]($style)"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[line_break]
disabled = false

[git_branch]
symbol = "пҗҳ"
style = "bg:#1D2230"
format = '[[ $symbol $branch ](fg:#FFFFFF bg:#1D2230)]($style)'

[git_status]
style = "bg:#1D2230"
format = '[[($all_status$ahead_behind )](fg:#FFFFFF bg:#1D2230)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:#1D2230"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#1D2230)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:#1D2230"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#1D2230)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:#1D2230"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#1D2230)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:#1D2230"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#1D2230)]($style)'

[time]
disabled = true
time_format = "%R" # Hour:Minute Format
style = "bg:#000000"
format = '[[ пҗә $time ](fg:#a0a9cb bg:#000000)]($style)'
